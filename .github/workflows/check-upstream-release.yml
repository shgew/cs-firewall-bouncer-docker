name: Check Upstream Release

on:
  schedule:
    - cron: '0 0 * * *'  # once a day
  workflow_dispatch:

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(cat version.txt)
          echo "Current version: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Check for new upstream version
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.current_version }}"

          LATEST_VERSION=$(gh api --paginate repos/crowdsecurity/cs-firewall-bouncer/tags \
            --jq '.[].name' | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n 1)

          if [ -z "$LATEST_VERSION" ]; then
            echo "No valid version tags found in the upstream repository"
            exit 1
          fi

          echo "Highest upstream version tag: $LATEST_VERSION"
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "New version available: $LATEST_VERSION (current: $CURRENT_VERSION)"
            echo "new_version_available=true" >> $GITHUB_OUTPUT
          else
            echo "Already using the latest version"
            echo "new_version_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version file
        if: steps.upstream.outputs.new_version_available == 'true'
        run: |
          echo "${{ steps.upstream.outputs.latest_version }}" > version.txt
          cat version.txt

      - name: Commit changes
        if: steps.upstream.outputs.new_version_available == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add version.txt
          git commit -m "Update to upstream ${{ steps.upstream.outputs.latest_version }}"
          git push

      - name: Check if release tag exists
        if: steps.upstream.outputs.new_version_available == 'true'
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.upstream.outputs.latest_version }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release with tag $TAG already exists. Skipping release creation."
            echo "release_exists=true" >> $GITHUB_OUTPUT
          else
            echo "No release found with tag $TAG. Proceeding with release creation."
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.upstream.outputs.new_version_available == 'true' && steps.check_release.outputs.release_exists == 'false'
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1
        with:
          tag: ${{ steps.upstream.outputs.latest_version }}
          name: ${{ steps.upstream.outputs.latest_version }}
          token: ${{ secrets.RELEASE_TOKEN }}
          body: |
            This release corresponds to CrowdSec Firewall Bouncer version ${{ steps.upstream.outputs.latest_version }}

            For more information, see the [upstream release](https://github.com/crowdsecurity/cs-firewall-bouncer/releases/tag/${{ steps.upstream.outputs.latest_version }}).
          draft: false
          prerelease: false
